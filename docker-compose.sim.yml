name: borzoi-sim

# ─────────────────────────────────────────────────────────────────────
# Sim-node stack — a single borzoi-backend container run in BORZOI_MODE=sim
# (distributed job-queue worker, see borzoi-backend/src/sim-server.ts) plus
# the shared OTA updater sidecar. No postgres / frontend / nginx: a sim node
# holds no database and exposes no inbound HTTP except a local /healthz probe;
# it reaches the coordinator (voltini.energy-backend) over outbound HTTPS only.
#
# OTA is identical to the full Hub FROM data/upgrade/request.json ONWARD —
# same updater sidecar, same request.json/status.json/capable files, same ECR
# pull + restart. Only the *trigger* differs: instead of an inbound
# /api/installer/upgrade call (which the Hub gets via its Cloudflare Tunnel),
# the sim node writes request.json itself when it claims an `update` job from
# the queue and has drained its in-flight work.
#
# The updater runs bare `docker compose` (no -f), so the generated .env sets
# COMPOSE_FILE=docker-compose.sim.yml to pin this file + the borzoi-sim project.
# ─────────────────────────────────────────────────────────────────────

services:
  sim:
    image: ${ECR_REGISTRY}/borzoi-backend:${BACKEND_TAG:-latest}
    container_name: borzoi-sim
    restart: unless-stopped
    env_file: .env
    environment:
      # Selects src/sim-server.ts in docker-entrypoint.sh (job-queue worker).
      BORZOI_MODE: sim
    volumes:
      # Shared OTA-upgrade channel with the updater sidecar: the sim node
      # writes request.json (after it has drained on an `update` job) and a
      # sibling marker, then reads status.json back after the restart.
      - ./data/upgrade:/data/upgrade
    healthcheck:
      # Liveness only — the node is reached via the outbound job queue, not here.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+(process.env.SIM_PORT||process.env.PORT||3100)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [borzoi-sim]

  # OTA updater sidecar — same image/script as the full Hub, parameterized for
  # the sim stack: only the `sim` service is pulled/recreated and the pre-update
  # DB backup is skipped (OTA_SERVICES / OTA_BACKUP read by scripts/updater.sh).
  # Built locally from ./updater (never pushed). The project is mounted at its
  # REAL host path (${INSTALL_DIR}) so compose's relative bind mounts resolve
  # identically inside and out.
  updater:
    build: ./updater
    image: borzoi-updater:local
    pull_policy: build
    container_name: borzoi-sim-updater
    restart: unless-stopped
    env_file: .env
    environment:
      OTA_SERVICES: sim
      OTA_BACKUP: "0"
    working_dir: ${INSTALL_DIR}
    entrypoint: ["bash", "./scripts/updater.sh"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${INSTALL_DIR}:${INSTALL_DIR}
      - ${HOST_AWS_DIR}:/root/.aws:ro
    networks: [borzoi-sim]

networks:
  borzoi-sim:
    driver: bridge
