name: borzoi

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: borzoi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
      # First-boot cluster init on Raspberry Pi SD storage can take
      # ~60s (CREATE ROLE/DATABASE, TimescaleDB extension install).
      # Failures during start_period don't count against retries.
      start_period: 90s
    networks: [borzoi]

  backend:
    image: ${ECR_REGISTRY}/borzoi-backend:${BACKEND_TAG:-latest}
    container_name: borzoi-backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    volumes:
      # Shared OTA-upgrade channel with the updater sidecar: the backend
      # writes request.json and reads status.json + the capability marker.
      - ./data/upgrade:/data/upgrade
    networks: [borzoi]

  # OTA updater sidecar — executes portal-triggered upgrades. Built locally
  # from ./updater (never pushed to a registry). It watches
  # data/upgrade/request.json and runs the backup → pull → up sequence via
  # the mounted Docker socket, writing progress to data/upgrade/status.json.
  # See scripts/updater.sh and docs/updating.md.
  #
  # The project is mounted at its REAL host path (${INSTALL_DIR}) so compose's
  # relative bind mounts resolve identically whether run from the host or
  # from inside this container. No published ports — the only trigger is the
  # local request file written by the (SSO-gated) backend.
  updater:
    build: ./updater
    image: borzoi-updater:local
    container_name: borzoi-updater
    restart: unless-stopped
    env_file: .env
    working_dir: ${INSTALL_DIR}
    entrypoint: ["bash", "./scripts/updater.sh"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${INSTALL_DIR}:${INSTALL_DIR}
      - ${HOST_AWS_DIR}:/root/.aws:ro
    networks: [borzoi]

  frontend:
    image: ${ECR_REGISTRY}/borzoi-frontend:${FRONTEND_TAG:-latest}
    container_name: borzoi-frontend
    restart: "no"
    volumes:
      - frontend-static:/shared
    networks: [borzoi]

  nginx:
    image: nginx:1.27-alpine
    container_name: borzoi-nginx
    restart: unless-stopped
    depends_on:
      frontend: { condition: service_completed_successfully }
    # Bind to loopback only — public exposure is expected to go through
    # Cloudflare Tunnel (or another reverse proxy) on the host, which
    # will forward to http://localhost:8080.
    ports:
      - "127.0.0.1:8080:80"
    env_file: .env
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - frontend-static:/usr/share/nginx/html:ro
    networks: [borzoi]

volumes:
  frontend-static:

networks:
  borzoi:
    driver: bridge
