name: borzoi

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: borzoi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [borzoi]

  backend:
    image: ${ECR_REGISTRY}/borzoi-backend:${BACKEND_TAG:-latest}
    container_name: borzoi-backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    networks: [borzoi]

  frontend:
    image: ${ECR_REGISTRY}/borzoi-frontend:${FRONTEND_TAG:-latest}
    container_name: borzoi-frontend
    restart: "no"
    volumes:
      - frontend-static:/shared
    networks: [borzoi]

  nginx:
    image: nginx:1.27-alpine
    container_name: borzoi-nginx
    restart: unless-stopped
    depends_on:
      frontend: { condition: service_completed_successfully }
    # Bind to loopback only — public exposure is expected to go through
    # Cloudflare Tunnel (or another reverse proxy) on the host, which
    # will forward to http://localhost:8080.
    ports:
      - "127.0.0.1:8080:80"
    env_file: .env
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - frontend-static:/usr/share/nginx/html:ro
    networks: [borzoi]

volumes:
  frontend-static:

networks:
  borzoi:
    driver: bridge
